<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#181b1c" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; media-src 'self' blob:; connect-src 'self' http: https:; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <title>Digital Objects</title>
    <link rel="stylesheet" href="./app.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to menu</a>

    <div id="app" class="game-shell">
      <div class="ambient ambient-one" aria-hidden="true"></div>
      <div class="ambient ambient-two" aria-hidden="true"></div>
      <div class="scanlines" aria-hidden="true"></div>

      <header class="game-hud">
        <a class="game-brand" href="#/home" aria-label="Digital Objects main menu">
          <span class="game-brand-mark" aria-hidden="true">DO</span>
          <span>
            <strong>Digital Objects</strong>
            <small>Light Console</small>
          </span>
        </a>

        <div class="hud-connection">
          <div id="driver-status" class="status status-connecting" data-status="connecting" role="status" aria-live="polite" aria-atomic="true">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="driver-status-label">Checking connection</span>
          </div>
          <div class="driver-meta">
            <span id="driver-version">No Driver selected</span>
            <span aria-hidden="true">/</span>
            <time id="last-updated">Not checked</time>
          </div>
        </div>

        <button id="refresh-button" class="hud-button" type="button" aria-label="Refresh console">
          <span class="refresh-icon" aria-hidden="true"></span>
          <span>Refresh</span>
        </button>
      </header>

      <main id="main-content" class="game-stage" tabindex="-1">
        <section class="boot-screen" aria-labelledby="boot-title">
          <div class="boot-glyph" aria-hidden="true">DO</div>
          <p class="game-kicker">Digital Objects Network</p>
          <h1 id="boot-title">Loading console</h1>
          <p>Reading connection profiles and checking the Driver.</p>
        </section>
      </main>

      <footer class="control-legend" aria-label="Menu controls">
        <div class="control-hints">
          <span><kbd>Arrow keys</kbd> Move</span>
          <span><kbd>Enter</kbd> Select</span>
          <span><kbd>Esc</kbd> Back</span>
        </div>
        <div id="music-controller" class="music-controller" data-player-state="empty" aria-label="Music player">
          <div class="music-display" aria-live="polite">
            <span id="music-track-title" class="music-track-title">Loading soundtrack</span>
          </div>
          <div class="music-controls">
            <button id="music-previous" class="music-button" type="button" aria-label="Previous track" title="Previous track" disabled>&larr;</button>
            <button id="music-play" class="music-button music-play" type="button" aria-label="Play" title="Play" disabled>&#9654;</button>
            <button id="music-next" class="music-button" type="button" aria-label="Next track" title="Next track" disabled>&rarr;</button>
          </div>
          <audio id="music-audio" preload="auto" autoplay></audio>
        </div>
        <div id="theme-picker" class="footer-theme-picker" role="group" aria-label="Screen palette">
          <button class="theme-option" type="button" data-command="set-theme" data-id="desk-classic" data-theme="desk-classic" aria-label="Desk Classic palette" title="Desk Classic" aria-pressed="true"></button>
          <button class="theme-option" type="button" data-command="set-theme" data-id="code-rain" data-theme="code-rain" aria-label="Code Rain palette" title="Code Rain" aria-pressed="false"></button>
          <button class="theme-option" type="button" data-command="set-theme" data-id="amber-tty" data-theme="amber-tty" aria-label="Amber TTY palette" title="Amber TTY" aria-pressed="false"></button>
          <button class="theme-option" type="button" data-command="set-theme" data-id="midnight-prompt" data-theme="midnight-prompt" aria-label="Midnight Prompt palette" title="Midnight Prompt" aria-pressed="false"></button>
          <button class="theme-option" type="button" data-command="set-theme" data-id="breadbox-8" data-theme="breadbox-8" aria-label="Breadbox 8 palette" title="Breadbox 8" aria-pressed="false"></button>
          <button class="theme-option" type="button" data-command="set-theme" data-id="skinned-stereo" data-theme="skinned-stereo" aria-label="Skinned Stereo palette" title="Skinned Stereo" aria-pressed="false"></button>
          <button class="theme-option" type="button" data-command="set-theme" data-id="paper-system" data-theme="paper-system" aria-label="Paper System palette" title="Paper System" aria-pressed="false"></button>
        </div>
        <button id="ui-sound-toggle" class="ui-sound-toggle" type="button" aria-label="Mute UI sounds" title="Mute UI sounds" aria-pressed="false">
          <svg class="speaker-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path class="speaker-body" d="M3 9h4l6-5v16l-6-5H3z"></path>
            <path class="speaker-waves" d="M16 8c1.2 1 1.8 2.3 1.8 4S17.2 15 16 16m3-11c2 1.8 3 4.1 3 7s-1 5.2-3 7"></path>
            <path class="speaker-muted" d="m16 9 5 6m0-6-5 6"></path>
          </svg>
        </button>
      </footer>
    </div>

    <div id="drawer-backdrop" class="drawer-backdrop" hidden></div>
    <aside id="drawer" class="drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title" hidden>
      <div id="drawer-content" class="drawer-content"></div>
    </aside>

    <div id="toast-region" class="toast-region" role="status" aria-live="polite"></div>

    <audio id="menu-click-audio" src="./sounds/menuclick.mp3" preload="auto" hidden></audio>

    <input id="pexe-input" class="visually-hidden-input" type="file" accept=".pexe,application/octet-stream" tabindex="-1" />
    <input id="dobj-input" class="visually-hidden-input" type="file" accept=".dobj,application/json" tabindex="-1" />
    <input id="config-input" class="visually-hidden-input" type="file" accept=".json,application/json" tabindex="-1" />

    <noscript>
      <div class="noscript-message" role="alert">
        <strong>JavaScript is required.</strong>
        This is a static HTML and JavaScript client; enable JavaScript to connect it to a DON Driver.
      </div>
    </noscript>
  </body>
</html>
